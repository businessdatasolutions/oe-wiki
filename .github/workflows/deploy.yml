name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Build Quartz
        run: npx quartz build -d wiki
        env:
          # FR-30 / buildplan Main Task 19.1: unset until GoatCounter's
          # one-time manual account signup is done and this secret is added
          # in repo Settings -> Secrets -> Actions; quartz.config.ts falls
          # back to analytics: null when it's empty, so this is safe today.
          QUARTZ_GOATCOUNTER_SITE_CODE: ${{ secrets.QUARTZ_GOATCOUNTER_SITE_CODE }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
